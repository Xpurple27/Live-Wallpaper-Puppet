name: anime_live_wallpaper
description: A stunning Anime Live Wallpaper application built with Flutter.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # For setting wallpapers on Android (including live wallpapers)
  async_wallpaper: ^3.1.0
  
  # Premium UI & UX Packages
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.0
  glassmorphism: ^3.0.0
  path_provider: ^2.1.0
  battery_plus: ^6.0.0          # Tambahkan ini untuk cek baterai nanti
  http: ^1.2.0                  # Tambahkan ini untuk ambil data cuaca nanti

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Asset declaration for anime images
  assets:
    - assets/images/
    - assets/images/anime_cyberpunk.png
    - assets/images/anime_landscape.png
    - assets/images/anime_character.png
